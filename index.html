<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-6xl">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
                Face Recognition System
            </h1>
            <p class="text-xl text-gray-600 max-w-2xl mx-auto">
                Register students and identify them using facial recognition technology
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="card bg-white p-6 rounded-2xl shadow-xl">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">👤 Add New Student</h2>
                <form id="addStudentForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Roll Number</label>
                        <input type="text" id="rollNumber" name="roll_number" class="w-full p-2 border rounded-lg" placeholder="e.g. CS001" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input type="text" id="studentName" name="name" class="w-full p-2 border rounded-lg" placeholder="Enter full name" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
                        <select id="department" name="department" class="w-full p-2 border rounded-lg" required>
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Economic">Economic</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Student Photo</label>
                        <input type="file" id="studentImage" name="image" accept="image/*" class="w-full p-2 border rounded-lg" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                        Add Student
                    </button>
                </form>
            </div>

            <div class="card bg-white p-6 rounded-2xl shadow-xl">
                <div class="flex gap-4 mb-6">
                    <button id="uploadBtn" class="bg-gray-100 text-gray-800 py-2 px-4 rounded-lg flex-1 hover:bg-gray-200">
                        📁 Upload Photo
                    </button>
                    <button id="webcamBtn" class="bg-blue-600 text-white py-2 px-4 rounded-lg flex-1 hover:bg-blue-700">
                        📹 Use camera
                    </button>
                </div>
                
                <input type="file" id="uploadImage" accept="image/*" class="hidden">
                
                <div id="webcamContainer" class="hidden mb-6 text-center">
                    <video id="webcam" autoplay muted playsinline class="rounded-xl w-full border-4 border-blue-500"></video>
                    <button id="captureBtn" class="mt-4 bg-purple-600 text-white py-2 px-6 rounded-full font-bold hover:bg-purple-700">
                        📸 Capture & Recognize
                    </button>
                </div>

                <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:bg-gray-50">
                    <p class="text-gray-500">Drop photo here or click to upload</p>
                </div>
            </div>
        </div>

        <div id="notification" class="fixed top-4 right-4 z-50 hidden p-4 rounded-lg shadow-lg text-white"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
